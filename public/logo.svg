<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#1e293b" rx="20"/>
  
  <!-- Gold circle -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#fbbf24" stroke-width="2"/>
  
  <!-- Scale symbol (scales of justice) -->
  <g transform="translate(100, 100)">
    <!-- Left pan -->
    <rect x="-45" y="20" width="30" height="8" fill="#fbbf24" rx="2"/>
    <line x1="-30" y1="20" x2="-25" y2="-15" stroke="#fbbf24" stroke-width="2"/>
    
    <!-- Right pan -->
    <rect x="15" y="20" width="30" height="8" fill="#fbbf24" rx="2"/>
    <line x1="30" y1="20" x2="25" y2="-15" stroke="#fbbf24" stroke-width="2"/>
    
    <!-- Balance beam -->
    <line x1="-30" y1="-15" x2="30" y2="-15" stroke="#fbbf24" stroke-width="3"/>
    <circle cx="0" cy="-15" r="3" fill="#fbbf24"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#fbbf24">RKS.AD</text>
</svg>
